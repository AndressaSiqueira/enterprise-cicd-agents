name: enterprise-cicd-governance
metadata:
  template: enterprise-cicd-governance@1.0.0

services:
  api:
    project: .
    language: ts
    host: containerapp
    docker:
      path: ./Dockerfile
      context: .

infra:
  provider: bicep
  path: ./infra/azure

hooks:
  preprovision:
    shell: pwsh
    run: |
      Write-Host "Preparing Azure deployment..."
      
  postprovision:
    shell: pwsh
    run: |
      Write-Host "Deployment complete!"
      Write-Host "API URL: $env:SERVICE_API_URI"
