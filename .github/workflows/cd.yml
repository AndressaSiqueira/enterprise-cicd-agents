name: CD - Deployment Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      skip_agents:
        description: 'Skip agent evaluation (for emergencies only)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  deployments: write
  id-token: write  # For OIDC authentication with Azure

env:
  NODE_VERSION: '20'
  # Azure Configuration - Set these as repository secrets/variables
  AZURE_RESOURCE_GROUP: rg-cicd-governance
  AZURE_LOCATION: eastus
  ACR_NAME: acrcicdgovernance
  CONTAINER_APP_NAME_STAGING: ca-governance-staging
  CONTAINER_APP_NAME_PROD: ca-governance-prod
  CONTAINER_APP_ENV: cae-governance

jobs:
  # ============================================
  # STEP 1: Provision Infrastructure (if needed)
  # ============================================
  provision-infrastructure:
    name: Provision Azure Infrastructure
    runs-on: ubuntu-latest
    outputs:
      acr_login_server: ${{ steps.provision.outputs.acr_login_server }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Provision Infrastructure
        id: provision
        run: |
          echo "🔧 Checking and provisioning Azure infrastructure..."
          
          # ============================================
          # 1. Resource Group
          # ============================================
          RG_EXISTS=$(az group exists --name ${{ env.AZURE_RESOURCE_GROUP }})
          if [ "$RG_EXISTS" = "false" ]; then
            echo "📦 Creating Resource Group..."
            az group create \
              --name ${{ env.AZURE_RESOURCE_GROUP }} \
              --location ${{ env.AZURE_LOCATION }}
          else
            echo "✅ Resource Group exists"
          fi
          
          # ============================================
          # 2. Container Registry
          # ============================================
          ACR_EXISTS=$(az acr show --name ${{ env.ACR_NAME }} --query "name" -o tsv 2>/dev/null || echo "")
          if [ -z "$ACR_EXISTS" ]; then
            echo "📦 Creating Container Registry..."
            az acr create \
              --name ${{ env.ACR_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --sku Basic \
              --admin-enabled false
          else
            echo "✅ Container Registry exists"
          fi
          
          # Get ACR login server and ID
          ACR_LOGIN_SERVER=$(az acr show --name ${{ env.ACR_NAME }} --query "loginServer" -o tsv)
          ACR_ID=$(az acr show --name ${{ env.ACR_NAME }} --query "id" -o tsv)
          echo "acr_login_server=$ACR_LOGIN_SERVER" >> $GITHUB_OUTPUT
          echo "acr_id=$ACR_ID" >> $GITHUB_OUTPUT
          
          # ============================================
          # 3. Grant AcrPush to Pipeline Service Principal
          # This allows the CD pipeline to push images to ACR
          # ============================================
          echo "🔐 Ensuring AcrPush permission for pipeline..."
          SP_APP_ID="${{ secrets.AZURE_CLIENT_ID }}"
          
          # Check if assignment exists
          ACRPUSH_EXISTS=$(az role assignment list \
            --assignee "$SP_APP_ID" \
            --role "AcrPush" \
            --scope "$ACR_ID" \
            --query "[0].id" -o tsv 2>/dev/null || echo "")
          
          if [ -z "$ACRPUSH_EXISTS" ]; then
            echo "📦 Granting AcrPush to pipeline Service Principal..."
            az role assignment create \
              --assignee "$SP_APP_ID" \
              --role "AcrPush" \
              --scope "$ACR_ID" || echo "⚠️ AcrPush assignment may already exist or require propagation"
          else
            echo "✅ AcrPush permission exists"
          fi
          
          # ============================================
          # 4. Container Apps Environment
          # ============================================
          CAE_EXISTS=$(az containerapp env show --name ${{ env.CONTAINER_APP_ENV }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query "name" -o tsv 2>/dev/null || echo "")
          if [ -z "$CAE_EXISTS" ]; then
            echo "📦 Creating Container Apps Environment..."
            az containerapp env create \
              --name ${{ env.CONTAINER_APP_ENV }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --location ${{ env.AZURE_LOCATION }}
          else
            echo "✅ Container Apps Environment exists"
          fi
          
          echo ""
          echo "✅ Infrastructure provisioning complete!"
          echo "   ACR: $ACR_LOGIN_SERVER"
          echo "   Environment: ${{ env.CONTAINER_APP_ENV }}"

  # ============================================
  # STEP 2: Build Application
  # ============================================
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: provision-infrastructure
    outputs:
      build_sha: ${{ github.sha }}
      image_tag: ${{ steps.meta.outputs.tags }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: |
          az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_NAME }}.azurecr.io/governance-api
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 5

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    outputs:
      deployment_status: ${{ steps.deploy.outputs.status }}
      staging_url: ${{ steps.deploy.outputs.url }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Container Apps (Staging)
        id: deploy
        run: |
          echo "🚀 Deploying to staging environment..."
          
          # Use short SHA for image tag (matches docker/metadata-action output)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="${{ env.ACR_NAME }}.azurecr.io/governance-api:${SHORT_SHA}"
          
          # Get ACR resource ID for role assignments
          ACR_ID=$(az acr show --name ${{ env.ACR_NAME }} --query "id" -o tsv)
          
          # Check if Container App exists
          APP_EXISTS=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME_STAGING }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "name" -o tsv 2>/dev/null || echo "")
          
          if [ -z "$APP_EXISTS" ]; then
            echo "📦 Creating new Container App with system-assigned managed identity..."
            
            # Create Container App with a placeholder image first to get managed identity
            # Using mcr.microsoft.com/k8se/quickstart as it's always available
            az containerapp create \
              --name ${{ env.CONTAINER_APP_NAME_STAGING }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --environment ${{ env.CONTAINER_APP_ENV }} \
              --image "mcr.microsoft.com/k8se/quickstart:latest" \
              --target-port 3000 \
              --ingress external \
              --min-replicas 1 \
              --max-replicas 3 \
              --system-assigned \
              --env-vars "NODE_ENV=staging"
            
            # Get the managed identity principal ID
            echo "🔐 Configuring ACR access for Container App managed identity..."
            IDENTITY_PRINCIPAL_ID=$(az containerapp show \
              --name ${{ env.CONTAINER_APP_NAME_STAGING }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query "identity.principalId" -o tsv)
            
            echo "   Identity Principal ID: $IDENTITY_PRINCIPAL_ID"
            
            # Grant AcrPull role to the Container App's managed identity
            echo "📦 Granting AcrPull permission..."
            az role assignment create \
              --assignee-object-id "$IDENTITY_PRINCIPAL_ID" \
              --assignee-principal-type "ServicePrincipal" \
              --role "AcrPull" \
              --scope "$ACR_ID"
            
            # Wait for role assignment to propagate
            echo "⏳ Waiting for role assignment to propagate (30s)..."
            sleep 30
            
            # Now update with the actual image from ACR
            echo "📦 Updating Container App with application image..."
            az containerapp update \
              --name ${{ env.CONTAINER_APP_NAME_STAGING }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --image "$IMAGE" \
              --set-env-vars "NODE_ENV=staging" "BUILD_SHA=${{ github.sha }}"
              
            # Configure registry with managed identity
            az containerapp registry set \
              --name ${{ env.CONTAINER_APP_NAME_STAGING }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --server "${{ env.ACR_NAME }}.azurecr.io" \
              --identity system
          else
            echo "📦 Updating existing Container App..."
            az containerapp update \
              --name ${{ env.CONTAINER_APP_NAME_STAGING }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --image "$IMAGE" \
              --set-env-vars "BUILD_SHA=${{ github.sha }}"
          fi
          
          # Get the URL
          URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME_STAGING }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          
          echo "status=success" >> $GITHUB_OUTPUT
          echo "url=https://$URL" >> $GITHUB_OUTPUT
          echo ""
          echo "✅ Deployed to: https://$URL"

      - name: Staging smoke tests
        run: |
          echo "Running staging smoke tests..."
          URL="${{ steps.deploy.outputs.url }}"
          
          # Wait for app to be ready
          sleep 10
          
          # Health check
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health" || echo "000")
          
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Health check passed (HTTP $HTTP_STATUS)"
          else
            echo "⚠️ Health check returned HTTP $HTTP_STATUS (may still be starting)"
          fi

  run-governance-checks:
    name: Production Governance Check
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: ${{ inputs.skip_agents != 'true' }}
    outputs:
      should_block: ${{ steps.observer.outputs.should_block }}
      overall_status: ${{ steps.observer.outputs.overall_status }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set GitHub context for agents
        run: |
          echo "GITHUB_SHA=${{ github.sha }}" >> $GITHUB_ENV
          echo "GITHUB_REF=${{ github.ref }}" >> $GITHUB_ENV
          echo "GITHUB_RUN_ID=${{ github.run_id }}" >> $GITHUB_ENV
          echo "GITHUB_RUN_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV
          echo "GITHUB_ACTOR=${{ github.actor }}" >> $GITHUB_ENV
          echo "GITHUB_EVENT_NAME=${{ github.event_name }}" >> $GITHUB_ENV
          echo "GITHUB_REPOSITORY=${{ github.repository }}" >> $GITHUB_ENV

      - name: Run IaC Agent
        run: npx tsx src/agents/iac-agent/index.ts

      - name: Run CI/CD Agent
        run: npx tsx src/agents/cicd-agent/index.ts

      - name: Run Security Agent
        run: npx tsx src/agents/security-agent/index.ts

      - name: Run Observer Agent
        id: observer
        run: |
          npx tsx src/agents/observer-agent/index.ts
          
          if [ -f "src/agents/observer-agent/status.json" ]; then
            SHOULD_BLOCK=$(jq -r '.shouldBlock' src/agents/observer-agent/status.json)
            OVERALL_STATUS=$(jq -r '.overallStatus' src/agents/observer-agent/status.json)
            echo "should_block=$SHOULD_BLOCK" >> $GITHUB_OUTPUT
            echo "overall_status=$OVERALL_STATUS" >> $GITHUB_OUTPUT
          else
            echo "should_block=true" >> $GITHUB_OUTPUT
            echo "overall_status=fail" >> $GITHUB_OUTPUT
          fi

      - name: Upload governance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-governance
          path: |
            src/agents/*/intent.json
            src/agents/observer-agent/decisions/
            src/agents/observer-agent/summary.md
            src/agents/observer-agent/status.json
            audit.json

      - name: Evaluate governance for production
        run: |
          SHOULD_BLOCK="${{ steps.observer.outputs.should_block }}"
          OVERALL_STATUS="${{ steps.observer.outputs.overall_status }}"
          
          echo "Production Governance Status: $OVERALL_STATUS"
          
          if [ "$OVERALL_STATUS" = "fail" ]; then
            echo "::error::Production deployment blocked by governance: DENIED"
            exit 1
          fi
          
          if [ "$OVERALL_STATUS" = "pending_approval" ]; then
            echo "::warning::Conditional approval required. Environment protection will handle this."
          fi

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging, run-governance-checks]
    # This job requires manual approval via GitHub Environment protection rules
    environment: 
      name: production
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
      status: ${{ steps.deploy.outputs.status }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download governance artifacts
        uses: actions/download-artifact@v4
        with:
          name: production-governance
          path: governance/

      - name: Verify governance approval
        run: |
          echo "🔐 Production deployment approved"
          echo "Approver context provided by GitHub Environment"
          echo ""
          
          if [ -f "governance/summary.md" ]; then
            echo "=== Governance Summary ==="
            cat governance/summary.md
            echo ""
          fi

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Container Apps (Production)
        id: deploy
        run: |
          echo "🚀 Deploying to production environment..."
          echo "SHA: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo "Run ID: ${{ github.run_id }}"
          echo ""
          
          # Get the image tag (same as staging, already tested)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="${{ env.ACR_NAME }}.azurecr.io/governance-api:${SHORT_SHA}"
          
          # Get ACR ID for role assignment
          ACR_ID=$(az acr show \
            --name ${{ env.ACR_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "id" -o tsv)
          
          # Check if Container App exists
          APP_EXISTS=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME_PROD }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "name" -o tsv 2>/dev/null || echo "")
          
          if [ -z "$APP_EXISTS" ]; then
            echo "Creating new Container App with placeholder image..."
            # Create with placeholder first to get managed identity
            az containerapp create \
              --name ${{ env.CONTAINER_APP_NAME_PROD }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --environment ${{ env.CONTAINER_APP_ENV }} \
              --image "mcr.microsoft.com/k8se/quickstart:latest" \
              --target-port 3000 \
              --ingress external \
              --min-replicas 2 \
              --max-replicas 10 \
              --env-vars "NODE_ENV=production" \
              --cpu 1.0 \
              --memory 2.0Gi \
              --system-assigned
            
            # Get the managed identity principal ID
            echo "Getting managed identity principal ID..."
            IDENTITY_PRINCIPAL_ID=$(az containerapp show \
              --name ${{ env.CONTAINER_APP_NAME_PROD }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query "identity.principalId" -o tsv)
            echo "Managed Identity Principal ID: $IDENTITY_PRINCIPAL_ID"
            
            # Grant AcrPull role to the managed identity
            echo "Granting AcrPull role to managed identity..."
            EXISTING_ROLE=$(az role assignment list \
              --assignee "$IDENTITY_PRINCIPAL_ID" \
              --role "AcrPull" \
              --scope "$ACR_ID" \
              --query "[0].id" -o tsv 2>/dev/null || echo "")
            
            if [ -z "$EXISTING_ROLE" ]; then
              az role assignment create \
                --assignee-object-id "$IDENTITY_PRINCIPAL_ID" \
                --assignee-principal-type ServicePrincipal \
                --role "AcrPull" \
                --scope "$ACR_ID"
              echo "✅ AcrPull role granted to managed identity"
              
              # Wait for role propagation
              echo "Waiting 30 seconds for role propagation..."
              sleep 30
            else
              echo "✅ AcrPull role already exists"
            fi
            
            # Now update with the actual image from ACR
            echo "Updating Container App with actual image..."
            az containerapp update \
              --name ${{ env.CONTAINER_APP_NAME_PROD }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --image $IMAGE
            
            # Configure registry with managed identity  
            az containerapp registry set \
              --name ${{ env.CONTAINER_APP_NAME_PROD }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --server ${{ env.ACR_NAME }}.azurecr.io \
              --identity system
          else
            echo "Updating existing Container App..."
            az containerapp update \
              --name ${{ env.CONTAINER_APP_NAME_PROD }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --image $IMAGE
          fi
          
          # Get the URL
          URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME_PROD }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          
          echo "status=success" >> $GITHUB_OUTPUT
          echo "url=https://$URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: https://$URL"

      - name: Production smoke tests
        run: |
          echo "Running production smoke tests..."
          URL="${{ steps.deploy.outputs.url }}"
          
          # Wait for app to be ready
          sleep 15
          
          # Health check with retries
          for i in 1 2 3; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health" || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Health check passed (HTTP $HTTP_STATUS)"
              break
            fi
            echo "Attempt $i: HTTP $HTTP_STATUS, retrying..."
            sleep 5
          done
          
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "⚠️ Health check did not return 200, but deployment may still be in progress"
          fi

      - name: Create deployment record
        run: |
          echo "Creating deployment record..."
          cat << EOF > deployment-record.json
          {
            "sha": "${{ github.sha }}",
            "environment": "production",
            "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "actor": "${{ github.actor }}",
            "run_id": "${{ github.run_id }}",
            "url": "${{ steps.deploy.outputs.url }}",
            "status": "success"
          }
          EOF
          cat deployment-record.json

      - name: Upload deployment evidence
        uses: actions/upload-artifact@v4
        with:
          name: production-deployment-evidence
          path: |
            deployment-record.json
            governance/
          retention-days: 90

  notify-deployment:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: deploy-production
    if: always()
    
    steps:
      - name: Notify on success
        if: needs.deploy-production.result == 'success'
        run: |
          echo "✅ Production deployment completed successfully!"
          echo "SHA: ${{ github.sha }}"
          echo "Repository: ${{ github.repository }}"
          echo "URL: ${{ needs.deploy-production.outputs.url }}"

      - name: Notify on failure
        if: needs.deploy-production.result == 'failure'
        run: |
          echo "❌ Production deployment failed!"
          echo "SHA: ${{ github.sha }}"
          echo "Check workflow run for details."
