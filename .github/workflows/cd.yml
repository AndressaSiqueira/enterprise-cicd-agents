name: CD - Deploy Governance SDK Server

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  deployments: write
  id-token: write

env:
  NODE_VERSION: '20'
  AZURE_RESOURCE_GROUP: rg-cicd-governance
  AZURE_LOCATION: eastus
  ACR_NAME: acrcicdgovernance
  CONTAINER_APP_NAME_STAGING: ca-governance-staging
  CONTAINER_APP_NAME_PROD: ca-governance-prod
  CONTAINER_APP_ENV: cae-governance

jobs:
  # ============================================
  # Provision Infrastructure (if needed)
  # ============================================
  provision-infrastructure:
    name: Provision Azure Infrastructure
    runs-on: ubuntu-latest
    outputs:
      acr_login_server: ${{ steps.provision.outputs.acr_login_server }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Provision Infrastructure
        id: provision
        run: |
          echo "🔧 Checking and provisioning Azure infrastructure..."
          
          # Resource Group
          RG_EXISTS=$(az group exists --name ${{ env.AZURE_RESOURCE_GROUP }})
          if [ "$RG_EXISTS" = "false" ]; then
            echo "📦 Creating Resource Group..."
            az group create \
              --name ${{ env.AZURE_RESOURCE_GROUP }} \
              --location ${{ env.AZURE_LOCATION }}
          else
            echo "✅ Resource Group exists"
          fi
          
          # Container Registry
          ACR_EXISTS=$(az acr show --name ${{ env.ACR_NAME }} --query "name" -o tsv 2>/dev/null || echo "")
          if [ -z "$ACR_EXISTS" ]; then
            echo "📦 Creating Container Registry..."
            az acr create \
              --name ${{ env.ACR_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --sku Basic \
              --admin-enabled false
          else
            echo "✅ Container Registry exists"
          fi
          
          ACR_LOGIN_SERVER=$(az acr show --name ${{ env.ACR_NAME }} --query "loginServer" -o tsv)
          ACR_ID=$(az acr show --name ${{ env.ACR_NAME }} --query "id" -o tsv)
          echo "acr_login_server=$ACR_LOGIN_SERVER" >> $GITHUB_OUTPUT
          
          # Grant AcrPush to Pipeline Service Principal
          SP_APP_ID="${{ secrets.AZURE_CLIENT_ID }}"
          ACRPUSH_EXISTS=$(az role assignment list \
            --assignee "$SP_APP_ID" \
            --role "AcrPush" \
            --scope "$ACR_ID" \
            --query "[0].id" -o tsv 2>/dev/null || echo "")
          
          if [ -z "$ACRPUSH_EXISTS" ]; then
            az role assignment create \
              --assignee "$SP_APP_ID" \
              --role "AcrPush" \
              --scope "$ACR_ID" || true
          fi
          
          # Container Apps Environment
          CAE_EXISTS=$(az containerapp env show --name ${{ env.CONTAINER_APP_ENV }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query "name" -o tsv 2>/dev/null || echo "")
          if [ -z "$CAE_EXISTS" ]; then
            echo "📦 Creating Container Apps Environment..."
            az containerapp env create \
              --name ${{ env.CONTAINER_APP_ENV }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --location ${{ env.AZURE_LOCATION }}
          else
            echo "✅ Container Apps Environment exists"
          fi
          
          echo "✅ Infrastructure ready"

  # ============================================
  # Build and Push Docker Image
  # ============================================
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: provision-infrastructure
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_NAME }}.azurecr.io/governance-sdk
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Deploy to Staging
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Container Apps (Staging)
        id: deploy
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="${{ env.ACR_NAME }}.azurecr.io/governance-sdk:${SHORT_SHA}"
          ACR_ID=$(az acr show --name ${{ env.ACR_NAME }} --query "id" -o tsv)
          
          APP_EXISTS=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME_STAGING }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "name" -o tsv 2>/dev/null || echo "")
          
          if [ -z "$APP_EXISTS" ]; then
            az containerapp create \
              --name ${{ env.CONTAINER_APP_NAME_STAGING }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --environment ${{ env.CONTAINER_APP_ENV }} \
              --image "mcr.microsoft.com/k8se/quickstart:latest" \
              --target-port 3000 \
              --ingress external \
              --min-replicas 1 \
              --max-replicas 3 \
              --system-assigned \
              --env-vars "NODE_ENV=staging" "GITHUB_TOKEN=secretref:github-token"
            
            IDENTITY_PRINCIPAL_ID=$(az containerapp show \
              --name ${{ env.CONTAINER_APP_NAME_STAGING }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query "identity.principalId" -o tsv)
            
            az role assignment create \
              --assignee-object-id "$IDENTITY_PRINCIPAL_ID" \
              --assignee-principal-type "ServicePrincipal" \
              --role "AcrPull" \
              --scope "$ACR_ID"
            
            sleep 30
            
            az containerapp registry set \
              --name ${{ env.CONTAINER_APP_NAME_STAGING }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --server "${{ env.ACR_NAME }}.azurecr.io" \
              --identity system
          fi
          
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME_STAGING }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image "$IMAGE" \
            --set-env-vars "BUILD_SHA=${{ github.sha }}"
          
          URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME_STAGING }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          
          echo "url=https://$URL" >> $GITHUB_OUTPUT
          echo "✅ Staging deployed: https://$URL"

      - name: Health check
        run: |
          sleep 10
          curl -f "${{ steps.deploy.outputs.url }}/health" || echo "Health check pending"

  # ============================================
  # Deploy to Production (requires approval)
  # ============================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: 
      name: production
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Container Apps (Production)
        id: deploy
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="${{ env.ACR_NAME }}.azurecr.io/governance-sdk:${SHORT_SHA}"
          ACR_ID=$(az acr show --name ${{ env.ACR_NAME }} --query "id" -o tsv)
          
          APP_EXISTS=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME_PROD }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "name" -o tsv 2>/dev/null || echo "")
          
          if [ -z "$APP_EXISTS" ]; then
            az containerapp create \
              --name ${{ env.CONTAINER_APP_NAME_PROD }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --environment ${{ env.CONTAINER_APP_ENV }} \
              --image "mcr.microsoft.com/k8se/quickstart:latest" \
              --target-port 3000 \
              --ingress external \
              --min-replicas 2 \
              --max-replicas 10 \
              --cpu 1.0 \
              --memory 2.0Gi \
              --system-assigned \
              --env-vars "NODE_ENV=production" "GITHUB_TOKEN=secretref:github-token"
            
            IDENTITY_PRINCIPAL_ID=$(az containerapp show \
              --name ${{ env.CONTAINER_APP_NAME_PROD }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query "identity.principalId" -o tsv)
            
            az role assignment create \
              --assignee-object-id "$IDENTITY_PRINCIPAL_ID" \
              --assignee-principal-type "ServicePrincipal" \
              --role "AcrPull" \
              --scope "$ACR_ID"
            
            sleep 30
            
            az containerapp registry set \
              --name ${{ env.CONTAINER_APP_NAME_PROD }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --server "${{ env.ACR_NAME }}.azurecr.io" \
              --identity system
          fi
          
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME_PROD }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image "$IMAGE" \
            --set-env-vars "BUILD_SHA=${{ github.sha }}"
          
          URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME_PROD }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          
          echo "url=https://$URL" >> $GITHUB_OUTPUT
          echo "✅ Production deployed: https://$URL"

      - name: Health check
        run: |
          sleep 15
          for i in 1 2 3; do
            if curl -f "${{ steps.deploy.outputs.url }}/health"; then
              echo "✅ Health check passed"
              exit 0
            fi
            sleep 5
          done
          echo "⚠️ Health check pending"
