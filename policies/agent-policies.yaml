# Agent Policies Configuration
# This file defines the governance rules for all CI/CD agents
# The Observer Agent evaluates intents against these policies

# IaC Agent Policies
# Controls infrastructure deployment actions
iac-agent:
  rules:
    # DENY: Production infrastructure changes require manual approval
    - action: apply_infra
      scope: prod
      decision: deny
      reason: "Production infrastructure changes are blocked by policy. Use manual deployment process."
    
    # ALLOW: Planning can happen in any scope
    - action: plan_infra
      scope: "*"
      decision: allow
      reason: "Infrastructure planning is permitted in all environments."
    
    # ALLOW: Verification is always permitted
    - action: verify_pipeline
      scope: "*"
      decision: allow
      reason: "Pipeline verification is always permitted."

# CI/CD Agent Policies
# Controls pipeline execution decisions
cicd-agent:
  rules:
    # ALLOW: Pipeline verification in any scope
    - action: verify_pipeline
      scope: "*"
      decision: allow
      reason: "Pipeline verification is permitted in all environments."
    
    # ALLOW: Re-run pipeline except in production
    - action: rerun_pipeline
      scope:
        not: prod
      decision: allow
      reason: "Pipeline re-runs are permitted in non-production environments."
    
    # DENY: No re-runs in production
    - action: rerun_pipeline
      scope: prod
      decision: deny
      reason: "Pipeline re-runs are not permitted in production. Requires new deployment."

# Security Agent Policies
# Controls security-related decisions
security-agent:
  rules:
    # ALLOW: Blocking PRs for security issues
    - action: block_pr
      scope: "*"
      decision: allow
      reason: "Security agent can block PRs with vulnerabilities."
    
    # ALLOW: Approving security checks
    - action: approve_security
      scope: "*"
      decision: allow
      reason: "Security approval is permitted when no vulnerabilities found."

# Default Policies
# Applied when no specific agent rule matches
default:
  rules:
    # CONDITIONAL: Unknown actions require human approval
    - action: "*"
      scope: "*"
      decision: conditional
      reason: "Unknown action/agent combination requires human approval."
