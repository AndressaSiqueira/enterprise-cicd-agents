# Multi-repo dependency map
# Defines which repositories depend on which

repositories:
  # Example: API Gateway depends on Auth and Database services
  repo-api:
    description: "Main API Gateway"
    dependencies:
      - repo-auth
      - repo-db
    critical: true  # Production critical service
    
  repo-auth:
    description: "Authentication Service"
    dependencies:
      - repo-db
    critical: true
    
  repo-payments:
    description: "Payment Processing Service"
    dependencies:
      - repo-api
      - repo-auth
    critical: true
    
  repo-frontend:
    description: "Web Frontend"
    dependencies:
      - repo-api
    critical: false
    
  repo-db:
    description: "Database Migrations"
    dependencies: []
    critical: true

# Deployment rules
rules:
  # Block deploys if dependencies have open PRs with breaking changes
  check_dependency_prs: true
  
  # Block deploys if dependencies have failing health checks
  check_dependency_health: true
  
  # Block deploys during active incidents
  check_active_incidents: true
  
  # Required health check threshold (percentage)
  health_threshold: 95

# Azure Monitor configuration
azure_monitor:
  # Resource IDs to check for each repo (maps repo name to Azure resource)
  resource_mapping:
    repo-api: "/subscriptions/{sub}/resourceGroups/rg-prod/providers/Microsoft.Web/sites/app-api"
    repo-auth: "/subscriptions/{sub}/resourceGroups/rg-prod/providers/Microsoft.Web/sites/app-auth"
    repo-payments: "/subscriptions/{sub}/resourceGroups/rg-prod/providers/Microsoft.ContainerApps/containerApps/ca-payments"
  
  # Metrics to check
  metrics:
    - name: "requests/failed"
      threshold: 10  # Alert if > 10 failed requests
    - name: "dependencies/failed"
      threshold: 5
    - name: "availabilityResults/availabilityPercentage"
      threshold: 95  # Alert if < 95% availability

# Grafana configuration  
grafana:
  # Dashboard to check for overall health
  dashboard_uid: "system-health"
  
  # Alerts panel to check
  alerts_panel: "active-alerts"
  
  # Thresholds
  max_active_alerts: 0  # Block if any active alerts
