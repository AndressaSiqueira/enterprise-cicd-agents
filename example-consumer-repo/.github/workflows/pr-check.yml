# PR Governance Check
# 
# This workflow calls the Enterprise Governance SDK to analyze PRs
# before they can be merged.

name: PR Governance Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  GOVERNANCE_API_URL: https://ca-governance-prod.azurecontainerapps.io

jobs:
  governance-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      # Call Governance SDK to analyze the PR
      - name: Governance - Analyze PR
        id: analyze-pr
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -d '{
              "owner": "${{ github.repository_owner }}",
              "repo": "${{ github.event.repository.name }}",
              "prNumber": ${{ github.event.pull_request.number }}
            }' \
            "${{ env.GOVERNANCE_API_URL }}/api/governance/analyze-pr")
          
          echo "Response: $RESPONSE"
          
          # Extract recommendation
          RECOMMENDATION=$(echo $RESPONSE | jq -r '.recommendation // "review"')
          echo "recommendation=$RECOMMENDATION" >> $GITHUB_OUTPUT
          
          # Save analysis for PR comment
          echo "$RESPONSE" | jq -r '.aiAnalysis // "Analysis not available"' > analysis.txt

      - name: Governance - Security Scan
        id: security-scan
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -d '{
              "owner": "${{ github.repository_owner }}",
              "repo": "${{ github.event.repository.name }}",
              "ref": "${{ github.head_ref }}"
            }' \
            "${{ env.GOVERNANCE_API_URL }}/api/governance/security-scan")
          
          echo "Response: $RESPONSE"
          
          SHOULD_BLOCK=$(echo $RESPONSE | jq -r '.shouldBlock // false')
          echo "should_block=$SHOULD_BLOCK" >> $GITHUB_OUTPUT

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const analysis = fs.readFileSync('analysis.txt', 'utf8');
            const recommendation = '${{ steps.analyze-pr.outputs.recommendation }}';
            const shouldBlock = '${{ steps.security-scan.outputs.should_block }}';
            
            const emoji = recommendation === 'approve' ? '✅' : 
                          recommendation === 'review' ? '⚠️' : '❌';
            
            const body = `## ${emoji} Governance Analysis
            
**Recommendation:** ${recommendation.toUpperCase()}
**Security Block:** ${shouldBlock}

### AI Analysis
${analysis}

---
*Powered by Enterprise Governance SDK*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Block if needed
        if: steps.analyze-pr.outputs.recommendation == 'block' || steps.security-scan.outputs.should_block == 'true'
        run: |
          echo "❌ PR blocked by governance policy"
          exit 1
