# Deployment with Governance
#
# This workflow deploys the service but first checks with the
# Governance SDK if deployment is safe (multi-repo check).

name: Deploy with Governance

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  GOVERNANCE_API_URL: https://ca-governance-prod.azurecontainerapps.io

jobs:
  # Step 1: Build and test
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # Step 2: Multi-repo governance check
  governance-check:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      decision: ${{ steps.check.outputs.decision }}
      can_deploy: ${{ steps.check.outputs.can_deploy }}
    steps:
      - name: Multi-repo governance check
        id: check
        run: |
          ENVIRONMENT="${{ github.event.inputs.environment || 'staging' }}"
          
          echo "🔍 Checking governance for deployment to $ENVIRONMENT..."
          
          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -d '{
              "owner": "${{ github.repository_owner }}",
              "repo": "${{ github.event.repository.name }}",
              "action": "deploy"
            }' \
            "${{ env.GOVERNANCE_API_URL }}/api/governance/multi-repo-check")
          
          echo "Response: $RESPONSE"
          
          # Extract decision
          DECISION=$(echo $RESPONSE | jq -r '.decision // "REVIEW"')
          echo "decision=$DECISION" >> $GITHUB_OUTPUT
          
          # Check if we can deploy
          if [ "$DECISION" == "APPROVE" ]; then
            echo "can_deploy=true" >> $GITHUB_OUTPUT
            echo "✅ Governance approved deployment"
          elif [ "$DECISION" == "REVIEW" ] && [ "$ENVIRONMENT" == "staging" ]; then
            echo "can_deploy=true" >> $GITHUB_OUTPUT
            echo "⚠️ Governance requires review, but allowing staging deploy"
          else
            echo "can_deploy=false" >> $GITHUB_OUTPUT
            echo "❌ Governance blocked deployment"
          fi
          
          # Show factors
          echo ""
          echo "📋 Governance factors:"
          echo $RESPONSE | jq -r '.factors[]? | "  - [\(.type)] \(.message)"'
          
          # Show system health
          echo ""
          echo "🏥 System health:"
          echo $RESPONSE | jq -r '.systemHealth | "  Azure Monitor: \(.azureMonitor.healthy) | Grafana: \(.grafana.healthy)"'
          
          # Show AI analysis
          echo ""
          echo "🤖 AI Analysis:"
          echo $RESPONSE | jq -r '.aiAnalysis // "No analysis available"'

      - name: Block if governance denied
        if: steps.check.outputs.can_deploy != 'true'
        run: |
          echo "❌ Deployment blocked by governance"
          echo "Decision: ${{ steps.check.outputs.decision }}"
          echo ""
          echo "Please resolve the issues identified by governance before deploying."
          exit 1

  # Step 3: Deploy to staging
  deploy-staging:
    runs-on: ubuntu-latest
    needs: governance-check
    if: needs.governance-check.outputs.can_deploy == 'true'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Staging
        run: |
          echo "🚀 Deploying to staging..."
          # Add your deployment commands here
          # Example: az containerapp update ...
          echo "✅ Deployed to staging successfully"

  # Step 4: Deploy to production (requires approval)
  deploy-production:
    runs-on: ubuntu-latest
    needs: [governance-check, deploy-staging]
    if: |
      needs.governance-check.outputs.can_deploy == 'true' && 
      needs.governance-check.outputs.decision == 'APPROVE' &&
      (github.event.inputs.environment == 'production' || github.event_name == 'push')
    environment: production
    steps:
      - uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Final governance check for production
        run: |
          echo "🔍 Final production governance check..."
          
          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -d '{
              "owner": "${{ github.repository_owner }}",
              "repo": "${{ github.event.repository.name }}",
              "environment": "production",
              "sha": "${{ github.sha }}"
            }' \
            "${{ env.GOVERNANCE_API_URL }}/api/governance/deployment-decision")
          
          DECISION=$(echo $RESPONSE | jq -r '.decision // "deny"')
          
          if [ "$DECISION" != "approve" ]; then
            echo "❌ Production deployment denied"
            echo $RESPONSE | jq -r '.aiAnalysis'
            exit 1
          fi
          
          echo "✅ Production deployment approved"

      - name: Deploy to Production
        run: |
          echo "🚀 Deploying to production..."
          # Add your deployment commands here
          echo "✅ Deployed to production successfully"

      - name: Notify deployment
        run: |
          echo "📢 Notifying team of production deployment..."
          # Add Slack/Teams notification here
