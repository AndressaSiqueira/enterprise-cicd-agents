# GitHub Workflow Integration Example
# 
# Copy this workflow to your repository's .github/workflows/ folder
# to integrate with the Governance SDK Server.
#
# Prerequisites:
# 1. Set GOVERNANCE_API_URL secret to your deployed Governance Server URL
# 2. Set GITHUB_TOKEN (automatically available in Actions)

name: Governance Check

on:
  pull_request:
    branches: [main, develop]

jobs:
  governance-analysis:
    name: AI Governance Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Analyze PR with Governance SDK
        id: governance
        env:
          GOVERNANCE_API_URL: ${{ secrets.GOVERNANCE_API_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Default URL if not set
          API_URL="${GOVERNANCE_API_URL:-https://ca-governance-prod.azurecontainerapps.io}"
          
          echo "🔍 Analyzing PR #${{ github.event.pull_request.number }}..."
          
          # Call the Governance API
          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -d '{
              "owner": "${{ github.repository_owner }}",
              "repo": "${{ github.event.repository.name }}",
              "prNumber": ${{ github.event.pull_request.number }},
              "branch": "${{ github.head_ref }}",
              "baseBranch": "${{ github.base_ref }}"
            }' \
            "$API_URL/api/governance/analyze-pr")
          
          # Parse response
          DECISION=$(echo "$RESPONSE" | jq -r '.decision // "UNKNOWN"')
          RISK_LEVEL=$(echo "$RESPONSE" | jq -r '.riskLevel // "unknown"')
          SUMMARY=$(echo "$RESPONSE" | jq -r '.summary // "No summary available"')
          
          echo "decision=$DECISION" >> $GITHUB_OUTPUT
          echo "risk_level=$RISK_LEVEL" >> $GITHUB_OUTPUT
          
          # Log results
          echo ""
          echo "📊 Governance Analysis Results"
          echo "================================"
          echo "Decision: $DECISION"
          echo "Risk Level: $RISK_LEVEL"
          echo ""
          echo "Summary:"
          echo "$SUMMARY"
          
          # Save full response for artifact
          echo "$RESPONSE" > governance-response.json

      - name: Security Scan
        id: security
        env:
          GOVERNANCE_API_URL: ${{ secrets.GOVERNANCE_API_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          API_URL="${GOVERNANCE_API_URL:-https://ca-governance-prod.azurecontainerapps.io}"
          
          echo "🔒 Running security scan..."
          
          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -d '{
              "owner": "${{ github.repository_owner }}",
              "repo": "${{ github.event.repository.name }}"
            }' \
            "$API_URL/api/governance/security-scan")
          
          VULNERABILITIES=$(echo "$RESPONSE" | jq -r '.vulnerabilities // 0')
          CRITICAL=$(echo "$RESPONSE" | jq -r '.critical // 0')
          
          echo "vulnerabilities=$VULNERABILITIES" >> $GITHUB_OUTPUT
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          
          echo "Found $VULNERABILITIES vulnerabilities ($CRITICAL critical)"
          
          echo "$RESPONSE" > security-response.json

      - name: Upload Governance Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: governance-results
          path: |
            governance-response.json
            security-response.json

      - name: Post PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const decision = '${{ steps.governance.outputs.decision }}';
            const riskLevel = '${{ steps.governance.outputs.risk_level }}';
            const vulnerabilities = '${{ steps.security.outputs.vulnerabilities }}';
            const critical = '${{ steps.security.outputs.critical }}';
            
            const emoji = {
              'APPROVE': '✅',
              'REVIEW': '⏳',
              'DENY': '❌'
            }[decision] || '❓';
            
            const riskEmoji = {
              'low': '🟢',
              'medium': '🟡',
              'high': '🟠',
              'critical': '🔴'
            }[riskLevel] || '⚪';
            
            const marker = '<!-- governance-analysis -->';
            const body = `${marker}
            
            ## 🤖 AI Governance Analysis
            
            | Metric | Value |
            |--------|-------|
            | **Decision** | ${emoji} ${decision} |
            | **Risk Level** | ${riskEmoji} ${riskLevel} |
            | **Vulnerabilities** | ${vulnerabilities} (${critical} critical) |
            
            ---
            *Powered by [Governance SDK](https://github.com/AndressaSiqueira/enterprise-cicd-agents)*
            `;
            
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const existing = comments.find(c => c.body.includes(marker));
            
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Evaluate Decision
        run: |
          DECISION="${{ steps.governance.outputs.decision }}"
          CRITICAL="${{ steps.security.outputs.critical }}"
          
          if [ "$DECISION" = "DENY" ]; then
            echo "::error::Governance decision: DENY - PR blocked"
            exit 1
          fi
          
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::Critical security vulnerabilities found: $CRITICAL"
            exit 1
          fi
          
          if [ "$DECISION" = "REVIEW" ]; then
            echo "::warning::Governance decision: REVIEW - Manual review recommended"
          fi
          
          echo "✅ Governance check passed"
